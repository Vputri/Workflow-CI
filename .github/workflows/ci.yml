name: CI - MLflow Project Retraining

# Kriteria 3:
#  - Basic    : menjalankan MLflow Project (mlflow run) -> menghasilkan model.
#  - Skilled  : menyimpan artefak model ke repositori (upload-artifact + commit).
#  - Advanced : build Docker image (mlflow models build-docker) & push ke Docker Hub.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  MLFLOW_TRACKING_URI: file:./mlruns   # relatif terhadap MLProject/

jobs:
  retrain:
    runs-on: ubuntu-latest
    # Ekspos secret Docker Hub sebagai env agar bisa dipakai pada kondisi `if`.
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
    defaults:
      run:
        working-directory: MLProject

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12.7
        uses: actions/setup-python@v5
        with:
          python-version: "3.12.7"

      - name: Install MLflow & dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow==2.19.0 scikit-learn==1.9.0 pandas==2.3.3 numpy==2.5.1 joblib==1.5.3

      # --- Basic: jalankan MLflow Project ---
      - name: Run MLflow Project (retraining)
        run: |
          mlflow run . --env-manager=local

      - name: Read run_id
        id: runid
        run: echo "run_id=$(cat run_id.txt)" >> "$GITHUB_OUTPUT"

      # --- Skilled: simpan artefak model ke repositori ---
      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-model
          path: MLProject/mlruns/

      - name: Commit MLflow runs to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mlruns/
          if git diff --staged --quiet; then
            echo "Tidak ada perubahan artefak."
          else
            git commit -m "ci: simpan artefak model hasil retraining [skip ci]"
            git push
          fi

      # --- Advanced: build Docker image & push ke Docker Hub ---
      # Langkah ini otomatis dilewati bila secret DOCKERHUB_USERNAME belum diisi,
      # sehingga level Basic/Skilled tetap menghasilkan workflow yang hijau.
      - name: Log in to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image with MLflow
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        run: |
          mlflow models build-docker \
            -m "runs:/${{ steps.runid.outputs.run_id }}/model" \
            -n "${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-model"

      - name: Push Docker image to Docker Hub
        if: ${{ env.DOCKERHUB_USERNAME != '' }}
        run: |
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/telco-churn-model"
